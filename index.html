<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Guest House Menteng Jaya</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-shell">
        <header class="hero">
            <div>
                <p class="eyebrow">Guest House & Kolam Renang</p>
                <h1>Menteng Jaya</h1>
                <p class="hero-subtitle">Masuk untuk mengelola dashboard, check in, check out, dan laporan.</p>
            </div>
        </header>
        <main class="main-content">
            <section class="page active">
                <div class="card auth-card">
                    <h2>Login Admin</h2>
                    <p>Login untuk mengakses dashboard manajemen kamar.</p>
                    <form id="loginForm">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="admin" required>
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="masukkan password" required>
                        <button type="submit" class="btn-primary">Masuk</button>
                        <p class="note">Username: <strong>admin</strong> | Password: <strong>menteng123</strong></p>
                        <div id="loginError" class="form-message"></div>
                    </form>
                </div>
            </section>
        </main>
    </div>
    <script src="login.js"></script>
</body>
</html>
